server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # ── API proxy → backend service ───────────────────────────────────────────
    # Audits are long-running; set generous timeouts so the proxy doesn't
    # drop the connection mid-audit.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # Allow large responses (full audit JSON can be several hundred KB)
        proxy_buffer_size          16k;
        proxy_buffers              8 16k;
        proxy_busy_buffers_size    32k;
    }

    # ── Health check proxy ────────────────────────────────────────────────────
    location /health {
        proxy_pass       http://backend:8000;
        proxy_set_header Host $host;
    }

    # ── React Router (SPA fallback) ───────────────────────────────────────────
    # Try the exact file/directory first; fall back to index.html so that
    # client-side routes like /audit/:jobId are handled by React Router.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
